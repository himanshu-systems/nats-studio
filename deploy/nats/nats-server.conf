# NATS Studio — development broker configuration.
# Loaded by the container as: nats-server -c /etc/nats/nats-server.conf
# Docs: https://docs.nats.io/running-a-nats-service/configuration

server_name: nats-studio-dev

# Client protocol. 0.0.0.0 so the port publishes out of the container.
listen: 0.0.0.0:4222

# HTTP monitoring endpoints: /varz, /healthz, /jsz, /connz, /subsz, ...
# Consumed by the app's monitoring feature (Phase 4) and the healthcheck.
http: 0.0.0.0:8222

# Sane development limits.
max_payload: 8MB
max_connections: 1000
max_control_line: 4KB

# JetStream: persistent streams / KV / object store (Phase 3). State lives in a
# named Docker volume mounted at /data/jetstream so it survives restarts.
jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 2GB
}

# Slow-consumer / write timeouts (defaults are fine for dev; made explicit).
write_deadline: "10s"
ping_interval: "2m"
ping_max: 2
