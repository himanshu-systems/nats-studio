version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-deps:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
