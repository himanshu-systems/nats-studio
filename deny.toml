# cargo-deny configuration — supply-chain gate (run in CI; see docs/architecture/xc-deployment-strategy.md).

[advisories]
version = 2
yanked = "deny"
# Tauri pulls a number of unmaintained crates deep in its tree (GTK3 bindings,
# rust-unic, proc-macro-error, ...) with no available fix. Only flag unmaintained
# crates that WE depend on directly; still fail hard on any actual vulnerability.
unmaintained = "workspace"
ignore = [
    # rustls-pemfile is unmaintained but pulled transitively (tokio-rustls tree);
    # no upstream fix available and it is not a vulnerability. Re-evaluate on dep bumps.
    "RUSTSEC-2025-0134",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
# ADR-0004: rustls only — no OpenSSL system dependency anywhere in the tree.
# (native-tls is intentionally NOT banned: it is a feature-gated escape hatch and
# uses SChannel/SecureTransport, not OpenSSL, on Windows/macOS.)
deny = [
    { name = "openssl-sys" },
    { name = "openssl" },
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots ships the Mozilla CA bundle under this permissive data license.
    "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
