# cargo-deny configuration — supply-chain gate (run in CI; see docs/architecture/xc-deployment-strategy.md).

[advisories]
version = 2
yanked = "deny"
# ignore = []  # add reviewed RUSTSEC ids here with a justification comment

[bans]
multiple-versions = "warn"
wildcards = "warn"
# ADR-0004: rustls only — no OpenSSL system dependency anywhere in the tree.
deny = [
    { name = "openssl-sys" },
    { name = "openssl" },
    { name = "native-tls" },  # allowed only behind an explicit feature; revisit if enabled
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
